<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VÉRITAS Campus — Application</title>
  <link rel="stylesheet" href="campus.css">
  <style>
    .app-shell { display: grid; grid-template-columns: 244px 1fr; min-height: calc(100vh - 69px); }
    @media (max-width: 860px) { .app-shell { grid-template-columns: 1fr; } .app-shell .side { display: none; } .app-shell.show-nav .side { display: block; position: fixed; z-index: 40; width: 244px; } }
    .side .logout { margin: 16px 10px; }
    .ufer { display: flex; align-items: center; gap: 8px; }
    .ufer .ava { width: 32px; height: 32px; border-radius: 50%; background: var(--ds-accent); color: var(--ds-on-accent); display: grid; place-items: center; font-weight: 800; }
    .chart { display: grid; gap: 8px; }
    .chart .row { display: grid; grid-template-columns: 90px 1fr 44px; gap: 10px; align-items: center; font-size: .85rem; }
    .alert { border-left: 4px solid var(--ds-accent); background: var(--ds-primary-050); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: .9rem; }
    .alert.bad { border-color: var(--ds-danger); background: color-mix(in srgb, var(--ds-danger) 7%, #fff); }
    .alert.ok { border-color: var(--ds-ok); background: color-mix(in srgb, var(--ds-ok) 8%, #fff); }
    .steps2 { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .steps2 .s { flex: 1; min-width: 110px; padding: 9px; border-radius: 8px; background: var(--ds-primary-050); font-size: .82rem; font-weight: 600; text-align: center; color: var(--ds-muted); }
    .steps2 .s.active { background: var(--ds-primary); color: #fff; }
    .restricted { text-align: center; padding: 60px 20px; }
    .restricted .ic { font-size: 60px; }
    .ovl { position: fixed; inset: 0; background: rgba(20,37,84,.5); display: grid; place-items: center; z-index: 60; padding: 20px; }
    .ovl-card { background: #fff; border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.3); max-width: 440px; width: 100%; padding: 20px; }
    .ovl-card h3 { margin: 0 0 12px; }
    .ovl-ft { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .ttcell:hover { outline: 2px solid var(--ds-accent); outline-offset: -2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  (function () {
    'use strict';
    var $ = function (s, r) { return (r || document).querySelector(s); };
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
    var CURRENCIES = { FCFA: 'FCFA', XOF: 'F CFA', EUR: '€', USD: '$', GHS: 'GH₵', NGN: '₦', MAD: 'DH' };
    function devise() { return (typeof DB !== 'undefined' && DB && DB.devise) || 'FCFA'; }
    function money(n) { return (Math.round(+n || 0)).toLocaleString('fr-FR') + ' ' + (CURRENCIES[devise()] || 'FCFA'); }
    function gid() { return Math.random().toString(36).slice(2, 9); }
    function today() { return new Date().toISOString().slice(0, 10); }
    function toast(m) { var t = $('#toast'); if (!t) return; t.textContent = m; t.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove('show'); }, 2600); }
    function modal(title, body, onOk, okLabel) {
      var ov = document.createElement('div'); ov.className = 'ovl';
      ov.innerHTML = '<div class="ovl-card"><h3>' + esc(title) + '</h3><div>' + body + '</div><div class="ovl-ft"><button class="btn btn-ghost" data-x="1" style="width:auto">Fermer</button><button class="btn btn-primary" data-ok="1" style="width:auto">' + esc(okLabel || 'Valider') + '</button></div></div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', function (e) {
        if (e.target === ov || e.target.getAttribute('data-x')) { ov.remove(); return; }
        if (e.target.getAttribute('data-ok')) { if (!onOk || onOk(ov) !== false) ov.remove(); }
      });
      return ov;
    }

    /* ── Rôles & accès ── */
    var VIEWS = {
      dashboard:  { label: 'Tableau de bord', ic: '📊', cap: null, grp: 'Pilotage' },
      eleves:     { label: 'Élèves', ic: '👥', cap: 'students.view', grp: 'Scolarité' },
      inscription:{ label: 'Inscriptions', ic: '📝', cap: 'students.manage', grp: 'Scolarité' },
      bulletins:  { label: 'Bulletins', ic: '🔢', cap: 'grades', grp: 'Pédagogie' },
      presences:  { label: 'Présences', ic: '🟢', cap: 'attendance', grp: 'Pédagogie' },
      edt:        { label: 'Emploi du temps', ic: '🗓️', cap: 'timetable', grp: 'Pédagogie' },
      conseil:    { label: 'Conseil de classe', ic: '⚖️', cap: 'deliberation', grp: 'Pédagogie' },
      discipline: { label: 'Discipline', ic: '🛡️', cap: 'discipline', grp: 'Vie scolaire' },
      infirmerie: { label: 'Infirmerie', ic: '🏥', cap: 'health', grp: 'Vie scolaire' },
      finances:   { label: 'Finances & Recouvrement', ic: '💳', cap: 'finance', grp: 'Finances' },
      paie:       { label: 'Paie enseignants', ic: '💼', cap: 'payroll', grp: 'Finances' },
      facturation:{ label: 'Facturation', ic: '🧾', cap: 'finance', grp: 'Finances' },
      biblio:     { label: 'Bibliothèque', ic: '📚', cap: 'library', grp: 'Services' },
      transport:  { label: 'Transport', ic: '🚌', cap: 'transport', grp: 'Services' },
      internat:   { label: 'Internat', ic: '🛏️', cap: 'boarding', grp: 'Services' },
      personnel:  { label: 'Personnel', ic: '👔', cap: 'staff', grp: 'Administration' },
      parametres: { label: 'Paramètres', ic: '⚙️', cap: 'settings', grp: 'Administration' },
      inventaire: { label: 'Inventaire', ic: '📦', cap: 'inventory', grp: 'Administration' },
      monespace: { label: 'Mon espace', ic: '🎒', cap: 'self', grp: 'Espace personnel' }
    };
    var ROLE_CAPS = {
      directeur: ['*'], proviseur: ['*'],
      enseignant: ['students.view', 'grades', 'attendance', 'discipline', 'timetable'],
      comptable: ['finance', 'payroll'],
      intendant: ['finance', 'payroll', 'transport', 'boarding', 'inventory'],
      secretariat: ['students.view', 'students.manage', 'library', 'timetable'],
      censeur: ['students.view', 'grades', 'attendance', 'discipline', 'timetable', 'settings', 'deliberation'],
      surveillant: ['students.view', 'attendance', 'discipline', 'health', 'boarding'],
      bibliothecaire: ['students.view', 'library'],
      infirmier: ['students.view', 'health'],
      eleve: ['self'], parent: ['self']
    };
    var ROLE_LABELS = { directeur: 'Directeur', proviseur: 'Proviseur', enseignant: 'Enseignant', comptable: 'Comptable', intendant: 'Intendant', secretariat: 'Secrétariat', censeur: 'Censeur', surveillant: 'Surveillant', bibliothecaire: 'Bibliothécaire', infirmier: 'Infirmier(ère)', eleve: 'Élève', parent: 'Parent' };
    function can(role, cap) { if (cap == null) return true; var c = ROLE_CAPS[role] || []; return c.indexOf('*') >= 0 || c.indexOf(cap) >= 0; }

    /* ── Matières (coefficients) ── */
    var SUBJECTS = [
      { n: 'Français', c: 4 }, { n: 'Anglais', c: 4 }, { n: 'Mathématiques', c: 4 },
      { n: 'SVT', c: 2 }, { n: 'Histoire-Géo', c: 3 }, { n: 'Physique-Chimie', c: 2 },
      { n: 'EPS', c: 1 }, { n: 'ECM', c: 1 }, { n: 'Informatique', c: 2 }
    ];
    var DAYS = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
    var HOURS = ['07-08', '08-09', '09-10', '10-11', '11-12', '13-14', '14-15', '15-16'];

    /* ── Données (persistées localStorage) ── */
    var DB;
    function load() { try { DB = JSON.parse(localStorage.getItem('cmp_app_db') || 'null'); } catch (e) { DB = null; } if (!DB) { seed(); return; } DB.medical = DB.medical || {}; DB.infirmary = DB.infirmary || []; DB.journals = DB.journals || []; DB.readingGroups = DB.readingGroups || []; DB.devise = DB.devise || 'FCFA'; DB.invoices = DB.invoices || []; DB.dorms = DB.dorms || []; DB.boarders = DB.boarders || []; DB.inventory = DB.inventory || []; DB.decisions = DB.decisions || {}; }
    function save() { DB.lastSave = Date.now(); localStorage.setItem('cmp_app_db', JSON.stringify(DB)); }
    function seed() {
      DB = { annee: '2025-2026', trimestre: 'Trimestre 2', ecole: 'Collège Bilingue Campus', matSeq: 0,
        classes: [], students: [], teachers: [], grades: {}, absences: [], sanctions: [], payments: [], edt: {}, books: [], loans: [], routes: [], payrolls: [], medical: {}, infirmary: [], journals: [], readingGroups: [] };
      [['6e A', '6e', '1er cycle'], ['5e A', '5e', '1er cycle'], ['4e A', '4e', '1er cycle'], ['3e A', '3e', '1er cycle']].forEach(function (c) {
        DB.classes.push({ id: gid(), nom: c[0], niveau: c[1], cycle: c[2], frais: 90000 });
      });
      var noms = ['NGUEMA Sandrine', 'ATANGANA Paul', 'MBALLA Grace', 'FOTSO Kevin', 'NKOLO Linda', 'BIYA Junior', 'KOM Aline', 'TABI Brice', 'SAA Mireille', 'OWONA Yvan', 'NGO Bella', 'ELA Steve', 'FOUDA Carine', 'SUH Derrick'];
      noms.forEach(function (nm, i) {
        var cl = DB.classes[i % DB.classes.length];
        DB.matSeq++;
        var st = { id: gid(), mat: matricule(cl, DB.matSeq), nom: nm.split(' ')[0], prenom: nm.split(' ').slice(1).join(' '),
          sexe: (i % 2 ? 'M' : 'F'), classeId: cl.id, tuteur: 'Tuteur ' + (i + 1), tel: '6' + (90000000 + i * 137), frais: cl.frais, statut: 'Inscrit' };
        DB.students.push(st);
        DB.grades[st.id] = {};
        var tgt = [16, 17, 15, 14, 12, 11, 13, 12, 9, 8, 10, 9, 7, 16][i % 14];
        SUBJECTS.forEach(function (s, j) { DB.grades[st.id][s.n] = { d1: clamp(tgt + ((j % 5) - 2)), d2: clamp(tgt + (((j + 2) % 5) - 2)) }; });
        // paiement partiel
        if (i % 4 !== 0) { DB.payments.push({ id: gid(), studentId: st.id, montant: 45000, date: '2025-10-05', tranche: '1re tranche', mode: 'Espèces' }); }
        if (i % 3 === 0) { DB.absences.push({ id: gid(), studentId: st.id, date: '2026-03-10', heures: (i === 6 ? 8 : 2), justifie: false, motif: 'Non justifiée' }); }
      });
      [['MBALLA', 'Rose', 'Français', 1500, 180000], ['ATANGANA', 'Marc', 'Mathématiques', 1800, 0], ['TABI', 'Alice', 'Anglais', 1500, 0], ['NGO', 'Paul', 'SVT', 1200, 150000]].forEach(function (t) {
        DB.teachers.push({ id: gid(), nom: t[0], prenom: t[1], matiere: t[2], taux: t[3], base: t[4] });
      });
      DB.books = [{ id: gid(), titre: 'Le Vieux Nègre et la médaille', auteur: 'F. Oyono', ex: 5, dispo: 3 }, { id: gid(), titre: 'Ville cruelle', auteur: 'Eza Boto', ex: 4, dispo: 4 }];
      DB.routes = [{ id: gid(), nom: 'Ligne A — Bonabéri', vehicule: 'LT-883', chauffeur: 'M. Eto', chauffeurTel: '699112233', places: 30, frais: 20000, eleves: [], stops: [{ nom: 'Bonabéri carrefour', heure: '06:30' }, { nom: 'Rond-point Deido', heure: '06:50' }, { nom: 'École', heure: '07:10' }] }];
      DB.students.forEach(function (s, i) { DB.medical[s.id] = { groupe: ['O+', 'A+', 'B+', 'AB+', 'O-'][i % 5], allergies: (i % 4 === 0 ? ['Arachide'] : (i % 5 === 0 ? ['Pénicilline'] : [])), antecedents: (i % 6 === 0 ? 'Asthme léger' : 'RAS'), traitements: '', urgenceNom: s.tuteur, urgenceTel: s.tel }; });
      DB.infirmary = [{ id: gid(), studentId: DB.students[0].id, date: '2026-03-12', motif: 'Maux de tête', soins: 'Paracétamol, repos 30 min', issue: 'Retour en classe' }];
      DB.journals = [{ id: gid(), titre: "L'Écho du Campus — N°1", date: '2026-02-01', statut: 'Publié', resume: 'Rentrée scolaire, résultats du 1er trimestre, lancement du club de lecture.', auteur: 'Comité de rédaction' }];
      DB.readingGroups = [{ id: gid(), nom: 'Cercle des jeunes lecteurs', niveau: '6e–5e', livre: 'Le Vieux Nègre et la médaille', membres: 6, anim: 'Mme MBALLA', prochaine: '2026-03-20' }];
      DB.devise = 'FCFA';
      DB.invoices = [];
      DB.dorms = [{ id: gid(), nom: 'Dortoir Garçons A', genre: 'M', cap: 24 }, { id: gid(), nom: 'Dortoir Filles A', genre: 'F', cap: 24 }];
      DB.boarders = [];
      DB.students.slice(0, 4).forEach(function (s) { var d = DB.dorms.filter(function (x) { return x.genre === s.sexe; })[0] || DB.dorms[0]; DB.boarders.push({ studentId: s.id, dormId: d.id, lit: DB.boarders.filter(function (b) { return b.dormId === d.id; }).length + 1, frais: 120000 }); });
      DB.inventory = [{ id: gid(), nom: 'Table-banc', categorie: 'Mobilier', qte: 120, etat: 'Bon', lieu: 'Salles de classe', valeur: 25000 }, { id: gid(), nom: 'Ordinateur portable', categorie: 'Informatique', qte: 8, etat: 'Bon', lieu: 'Salle informatique', valeur: 180000 }, { id: gid(), nom: 'Microscope', categorie: 'Laboratoire', qte: 5, etat: 'À réviser', lieu: 'Labo SVT', valeur: 75000 }];
      DB.decisions = {};
      save();
    }
    function clamp(n) { return Math.max(0, Math.min(20, n)); }
    function matricule(cl, seq) { return 'CMP25-' + cl.nom.replace(/\s/g, '') + '-' + ('00' + seq).slice(-3); }

    /* ── Session ── */
    function role() { return sessionStorage.getItem('cmp_profile') || ''; }
    function userName() { return sessionStorage.getItem('cmp_user') || (ROLE_LABELS[role()] || 'Utilisateur'); }

    /* ── Calculs interconnectés ── */
    function classOf(id) { return DB.classes.filter(function (c) { return c.id === id; })[0] || {}; }
    function studentsOf(classeId) { return DB.students.filter(function (s) { return s.classeId === classeId; }); }
    function paid(studentId) { return DB.payments.filter(function (p) { return p.studentId === studentId; }).reduce(function (t, p) { return t + (+p.montant); }, 0); }
    function absHours(studentId) { return DB.absences.filter(function (a) { return a.studentId === studentId; }).reduce(function (t, a) { return t + (+a.heures); }, 0); }
    function moyenneOf(studentId) {
      var g = DB.grades[studentId] || {}, w = 0, c = 0;
      SUBJECTS.forEach(function (s) { var x = g[s.n]; if (x && x.d1 != null && x.d2 != null) { var m = (+x.d1 + +x.d2) / 2; w += m * s.c; c += s.c; } });
      return c ? w / c : 0;
    }
    function mention(m) { return m >= 16 ? 'Félicitations' : m >= 14 ? "Tableau d'honneur" : m >= 12 ? 'Encouragements' : m >= 10 ? 'Passable' : 'Avertissement'; }
    // Bulletins d'une classe avec rang.
    function bulletinsOf(classeId) {
      var arr = studentsOf(classeId).map(function (s) { return { s: s, moy: moyenneOf(s.id), abs: absHours(s.id) }; });
      arr.sort(function (a, b) { return b.moy - a.moy; });
      arr.forEach(function (x, i) { x.rang = i + 1; x.mention = mention(x.moy); });
      return arr;
    }
    // AUTOMATISATIONS : tableaux d'honneur + convocations (notes basses).
    function honorRoll() { return DB.students.map(function (s) { return { s: s, moy: moyenneOf(s.id) }; }).filter(function (x) { return x.moy >= 14; }).sort(function (a, b) { return b.moy - a.moy; }); }
    function convocations() {
      return DB.students.map(function (s) { return { s: s, moy: moyenneOf(s.id), abs: absHours(s.id) }; })
        .filter(function (x) { return x.moy < 10 || x.abs >= 8; })
        .map(function (x) { x.motif = (x.moy < 10 ? 'Moyenne faible (' + x.moy.toFixed(2) + '/20)' : '') + (x.abs >= 8 ? (x.moy < 10 ? ' + ' : '') + 'Absences ' + x.abs + 'h' : ''); return x; });
    }
    // IA : indice de risque de décrochage (0-100) à partir de la moyenne, des absences, des impayés, des sanctions.
    function riskScore(s) {
      var m = moyenneOf(s.id), abs = absHours(s.id), solde = s.frais - paid(s.id), sc = 0;
      if (m < 10) sc += 40; else if (m < 12) sc += 20;
      sc += Math.min(30, abs * 3);
      if (solde > s.frais * 0.6) sc += 20; else if (solde > 0) sc += 10;
      sc += Math.min(15, DB.sanctions.filter(function (x) { return x.studentId === s.id && x.type !== 'Félicitations'; }).length * 8);
      return Math.min(100, Math.round(sc));
    }
    function riskLevel(sc) { return sc >= 60 ? ['Élevé', 'bad'] : sc >= 35 ? ['Modéré', 'acc'] : ['Faible', 'ok']; }

    /* ── Shell ── */
    function render() {
      var r = role();
      if (!r) return renderLogin();
      var route = (location.hash || '#dashboard').slice(1);
      if (!VIEWS[route]) route = 'dashboard';
      if ((r === 'eleve' || r === 'parent') && route === 'dashboard') route = 'monespace';
      var allowed = can(r, VIEWS[route].cap);
      var nav = navHtml(r, route);
      $('#root').innerHTML =
        '<header class="cmp-bar"><div class="logo">' + initials(DB.ecole) + '</div>'
        + '<div class="brand"><b>' + esc(DB.ecole) + '</b><small>' + esc(DB.annee) + ' · ' + esc(DB.trimestre) + '</small></div>'
        + '<div class="spacer"></div>'
        + '<div class="ufer"><div class="ava">' + initials(userName()) + '</div><div style="line-height:1.15"><b style="font-size:.85rem">' + esc(userName()) + '</b><br><small style="opacity:.8">' + esc(ROLE_LABELS[r] || r) + '</small></div></div></header>'
        + '<div class="app-shell"><aside class="side">' + nav + '<button class="btn btn-accent logout" id="logout">⎋ Déconnexion</button></aside>'
        + '<main class="work" id="view"></main></div>'
        + '<div class="toast" id="toast"></div>';
      $('#logout').addEventListener('click', function () { sessionStorage.removeItem('cmp_profile'); sessionStorage.removeItem('cmp_user'); location.hash = ''; render(); });
      var V = allowed ? VIEWMAP[route] : viewRestricted;
      (V || viewRestricted)();
    }
    function initials(s) { return (s || 'VC').trim().split(/\s+/).slice(0, 2).map(function (w) { return w[0]; }).join('').toUpperCase(); }
    function navHtml(r, route) {
      var grp = null, html = '';
      Object.keys(VIEWS).forEach(function (k) {
        var v = VIEWS[k]; if (!can(r, v.cap)) return;
        if (v.cap === null && (r === 'eleve' || r === 'parent')) return;
        if (v.grp !== grp) { grp = v.grp; html += '<div class="grp">' + grp + '</div>'; }
        html += '<a href="#' + k + '"' + (k === route ? ' class="active"' : '') + '><span class="ic">' + v.ic + '</span> ' + v.label + '</a>';
      });
      return html;
    }
    function setView(html) { $('#view').innerHTML = html; }
    function viewRestricted() { setView('<div class="restricted"><div class="ic">🔒</div><h2>Accès restreint</h2><p class="note">Votre profil (' + esc(ROLE_LABELS[role()] || role()) + ') n\'a pas accès à cette section.</p><a class="btn btn-primary" href="#dashboard" style="width:auto;display:inline-flex">← Tableau de bord</a></div>'); }

    /* ── Connexion (sélecteur de rôle) ── */
    function renderLogin() {
      var roles = ['directeur', 'enseignant', 'comptable', 'secretariat', 'censeur', 'intendant', 'surveillant', 'bibliothecaire', 'infirmier', 'eleve', 'parent'];
      $('#root').innerHTML = '<header class="cmp-bar"><div class="logo">' + initials(DB.ecole) + '</div><div class="brand"><b>' + esc(DB.ecole) + '</b><small>VÉRITAS Campus</small></div></header>'
        + '<main class="cmp-wrap"><div class="cmp-grid split">'
        + '<section class="brandpane"><span class="chip">Identification</span><div class="logoBig">' + initials(DB.ecole) + '</div><h1 class="big">' + esc(DB.ecole) + '</h1><p class="lead">Choisissez votre profil : chacun accède uniquement à ses fonctions.</p></section>'
        + '<section class="card"><h2>Connexion</h2><p class="sub">Sélectionnez un profil pour entrer.</p>'
        + '<div class="field"><label>Nom (facultatif)</label><input id="lUser" placeholder="Votre nom"></div>'
        + '<div class="pillrow">' + roles.map(function (r) { return '<button class="pillcheck" data-r="' + r + '">' + esc(ROLE_LABELS[r]) + '</button>'; }).join('') + '</div></section>'
        + '</div></main><div class="toast" id="toast"></div>';
      $('.pillrow').addEventListener('click', function (e) {
        var b = e.target.closest('button[data-r]'); if (!b) return;
        sessionStorage.setItem('cmp_profile', b.getAttribute('data-r'));
        if ($('#lUser').value.trim()) sessionStorage.setItem('cmp_user', $('#lUser').value.trim());
        location.hash = '#dashboard'; render();
      });
    }

    /* ── Vues ── */
    function viewDashboard() {
      var eff = DB.students.length;
      var totalFrais = DB.students.reduce(function (t, s) { return t + (+s.frais); }, 0);
      var encaisse = DB.payments.reduce(function (t, p) { return t + (+p.montant); }, 0);
      var recouv = totalFrais ? Math.round(encaisse / totalFrais * 100) : 0;
      var moys = DB.students.map(function (s) { return moyenneOf(s.id); });
      var moyG = moys.length ? (moys.reduce(function (t, m) { return t + m; }, 0) / moys.length) : 0;
      var reussite = moys.length ? Math.round(moys.filter(function (m) { return m >= 10; }).length / moys.length * 100) : 0;
      var absToday = DB.absences.filter(function (a) { return a.date === today(); }).length;
      var presRate = eff ? Math.round((eff - absToday) / eff * 100) : 100;
      var maxC = Math.max.apply(null, DB.classes.map(function (c) { return studentsOf(c.id).length; }).concat([1]));
      var chart = DB.classes.map(function (c) { var n = studentsOf(c.id).length; return '<div class="row"><span>' + esc(c.nom) + '</span><span class="pbar" style="min-width:0"><span style="width:' + (n / maxC * 100) + '%"></span></span><b>' + n + '</b></div>'; }).join('');
      var hr = honorRoll(), cv = convocations();

        var libres = DB.students.filter(function (s) { return !DB.boarders.some(function (b) { return b.studentId === s.id; }); });
        if (!libres.length) { toast('Tous les élèves sont déjà internes.'); return; }
        modal('Affecter un interne', '<div class="field"><label>Élève</label><select id="bStud">' + libres.map(function (s) { return '<option value="' + s.id + '">' + esc(s.nom + ' ' + s.prenom + ' (' + (classOf(s.classeId).nom || '') + ')') + '</option>'; }).join('') + '</select></div><div class="field"><label>Dortoir</label><select id="bDorm">' + DB.dorms.map(function (d) { return '<option value="' + d.id + '">' + esc(d.nom) + '</option>'; }).join('') + '</select></div>' + field('Frais d\'internat', 'bFrais', 120000, 'number'), function () { var sid = $('#bStud').value, did = $('#bDorm').value; DB.boarders.push({ studentId: sid, dormId: did, lit: DB.boarders.filter(function (b) { return b.dormId === did; }).length + 1, frais: +$('#bFrais').value || 0 }); save(); render(); toast('✓ Interne affecté.'); });
      });
      document.querySelectorAll('[data-rmboard]').forEach(function (b) { b.addEventListener('click', function () { var id = b.getAttribute('data-rmboard'); DB.boarders = DB.boarders.filter(function (x) { return x.studentId !== id; }); save(); render(); }); });
    }

    /* ── Inventaire : patrimoine & matériel ── */
    function viewInventaire() {
      var tot = DB.inventory.reduce(function (t, it) { return t + it.qte * it.valeur; }, 0);
      setView('<h1>Inventaire</h1><div class="crumb">Patrimoine & matériel de l\'établissement</div>'
        + '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><b>Valeur totale estimée : </b><span class="ggreen">' + money(tot) + '</span></div><button class="btn btn-primary" id="ivAdd" style="width:auto">+ Article</button></div>'
        + '<table class="note-table"><thead><tr><th>Article</th><th>Catégorie</th><th>Qté</th><th>État</th><th>Emplacement</th><th>Valeur unit.</th><th>Total</th><th></th></tr></thead><tbody>'
        + DB.inventory.map(function (it) { return '<tr><td><b>' + esc(it.nom) + '</b></td><td>' + esc(it.categorie) + '</td><td class="c">' + it.qte + '</td><td class="c">' + esc(it.etat) + '</td><td>' + esc(it.lieu) + '</td><td class="c">' + money(it.valeur) + '</td><td class="c">' + money(it.qte * it.valeur) + '</td><td class="c"><button class="btn btn-ghost" data-rminv="' + it.id + '" style="width:auto;padding:3px 8px">✕</button></td></tr>'; }).join('')
        + '</tbody></table></div>');
      $('#ivAdd').addEventListener('click', function () {
        modal('Nouvel article', field('Désignation', 'ivN', '') + '<div class="field"><label>Catégorie</label><select id="ivC"><option>Mobilier</option><option>Informatique</option><option>Laboratoire</option><option>Sport</option><option>Fourniture</option><option>Véhicule</option><option>Autre</option></select></div>' + field('Quantité', 'ivQ', 1, 'number') + '<div class="field"><label>État</label><select id="ivE"><option>Bon</option><option>À réviser</option><option>Hors service</option></select></div>' + field('Emplacement', 'ivL', '') + field('Valeur unitaire', 'ivV', 0, 'number'), function () { var nm = $('#ivN').value.trim(); if (!nm) { toast('Désignation requise.'); return false; } DB.inventory.push({ id: gid(), nom: nm, categorie: $('#ivC').value, qte: +$('#ivQ').value || 0, etat: $('#ivE').value, lieu: $('#ivL').value, valeur: +$('#ivV').value || 0 }); save(); render(); toast('✓ Article ajouté.'); });
      });
      document.querySelectorAll('[data-rminv]').forEach(function (b) { b.addEventListener('click', function () { var id = b.getAttribute('data-rminv'); DB.inventory = DB.inventory.filter(function (x) { return x.id !== id; }); save(); render(); }); });
    }

    var VIEWMAP = { dashboard: viewDashboard, eleves: viewEleves, inscription: viewInscription, bulletins: viewBulletins, presences: viewPresences, edt: viewEdt, conseil: viewConseil, discipline: viewDiscipline, infirmerie: viewInfirmerie, finances: viewFinances, paie: viewPaie, facturation: viewFacturation, biblio: viewBiblio, transport: viewTransport, internat: viewInternat, personnel: viewPersonnel, parametres: viewParametres, inventaire: viewInventaire, monespace: viewMonEspace };

    window.addEventListener('hashchange', render);
    load(); render();
  })();
  </script>
</body>
</html>
