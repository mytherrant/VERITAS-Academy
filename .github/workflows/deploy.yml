# ============================================================
# VÉRITAS — Déploiement automatique vers veritas-school.com
# Se déclenche à chaque push sur master qui touche ces fichiers
# ============================================================
name: 🚀 Déployer sur veritas-school.com

on:
  push:
    branches: [master]
    paths:
      - 'VERITAS_v1.2.html'
      - 'VERITAS_v1.1.html'
      - 'VERITAS_Promo_Video.html'
      - 'reset.html'
      - 'admin-validation.html'
      - 'index.php'
      - 'app.css'
      - 'app.js'
      - '.htaccess'
      - 'api/**'
      - 'evaluations/**'
      - 'cours/**'
      - 'Logo détouré.png'
      - 'ambassa-avatar.jpg'
      - 'ambassa-avatar.png'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'ai.txt'

  # Lancement manuel depuis GitHub → Actions → Run workflow
  workflow_dispatch:

jobs:
  deploy:
    name: 📤 Upload vers LWS (FTP)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: 📋 Préparer les fichiers
        run: |
          mkdir -p deploy/api \
                   deploy/data \
                   deploy/api/data \
                   deploy/uploads/veritas \
                   deploy/uploads/media \
                   deploy/uploads/video \
                   deploy/uploads/epreuve \
                   deploy/uploads/cours \
                   deploy/uploads/ressource \
                   deploy/uploads/image

          # ── Application principale ──────────────────────────────
          # app.html → servi par index.php (wrapper no-cache LiteSpeed)
          # index.html → accès direct sans PHP
          # Priorité v1.2 si présent, sinon fallback v1.1
          if [ -f "VERITAS_v1.2.html" ]; then
            cp VERITAS_v1.2.html deploy/app.html
            cp VERITAS_v1.2.html deploy/index.html
            echo "  ✓ VERITAS_v1.2.html → app.html + index.html"
          else
            cp VERITAS_v1.1.html deploy/app.html
            cp VERITAS_v1.1.html deploy/index.html
            echo "  ✓ VERITAS_v1.1.html → app.html + index.html"
          fi
          cp index.php         deploy/index.php
          # v1.2.2 : CSS + JS principaux extraits (cacheables séparément → 1er chargement allégé)
          if [ -f app.css ]; then cp app.css deploy/; echo "  ✓ app.css"; fi
          if [ -f app.js ];  then cp app.js  deploy/; echo "  ✓ app.js"; fi

          # Logo
          if [ -f "Logo détouré.png" ]; then cp "Logo détouré.png" deploy/; fi

          # Avatar IA Ambassa (portrait — .png ou .jpg selon disponibilité)
          if [ -f "ambassa-avatar.png" ]; then cp "ambassa-avatar.png" deploy/; echo "  ✓ ambassa-avatar.png"; fi
          if [ -f "ambassa-avatar.jpg" ]; then cp "ambassa-avatar.jpg" deploy/; echo "  ✓ ambassa-avatar.jpg"; fi

          # .htaccess (sécurité + cache + MIME)
          if [ -f .htaccess ]; then cp .htaccess deploy/; fi

          # ── SEO + PWA (sitemap, robots, manifest) ───────────────
          for f in sitemap.xml robots.txt manifest.webmanifest sw.js ai.txt; do
            [ -f "$f" ] && cp "$f" deploy/ && echo "  ✓ $f"
          done

          # ── Vidéo promotionnelle ───────────────────────────────
          if [ -f VERITAS_Promo_Video.html ]; then
            cp VERITAS_Promo_Video.html deploy/
            echo "  ✓ VERITAS_Promo_Video.html"
          fi

          # ── Page de réparation d'urgence (reset.html) ──────────
          # Accessible via https://veritas-school.com/reset.html
          # Désinscrit le SW + vide le cache en 1 clic (pour debug user)
          if [ -f reset.html ]; then
            cp reset.html deploy/
            echo "  ✓ reset.html"
          fi

          # ── API PHP ─────────────────────────────────────────────
          # config.php = credentials MySQL → NE JAMAIS déployer via CI
          # payment_config.php = credentials Orange/MTN → NE JAMAIS déployer via CI
          # database_mysql.sql = schéma de référence → NE PAS exposer publiquement
          for f in \
            api/db.php \
            api/upload.php \
            api/config_sync.php \
            api/sync.php \
            api/files.php \
            api/upload_file.php \
            api/upload_video.php \
            api/news_proxy.php \
            api/public_data.php \
            api/payment_orange.php \
            api/payment_mtn.php \
            api/ia_proxy.php \
            api/rag.php \
            api/admin_validate.php; do
            [ -f "$f" ] && cp "$f" deploy/api/ && echo "  ✓ $f"
          done

          # ── Page admin de validation des réponses IA (Plan Élite) ─
          if [ -f admin-validation.html ]; then
            cp admin-validation.html deploy/
            echo "  ✓ admin-validation.html"
          fi

          # ── Répertoire data protégé (veritas_db.json) ──────────
          if [ -f api/data/index.php ]; then
            cp api/data/index.php deploy/api/data/
          fi
          # ── v1.2.1 : protéger le dossier data/ RACINE où db.php écrit veritas_db.json ──
          #    Sans .htaccess ici, /data/veritas_db.json serait téléchargeable directement (toute la base).
          if [ -f data/.htaccess ]; then
            cp data/.htaccess deploy/data/
            echo "  ✓ data/.htaccess (bloque le téléchargement direct de la base)"
          fi
          printf '<?php http_response_code(403); exit;' > deploy/data/index.php

          # ── Évaluations et cours interactifs ────────────────────
          if [ -d evaluations ]; then cp -r evaluations/ deploy/evaluations/; fi
          if [ -d cours ];       then cp -r cours/       deploy/cours/;       fi

          # Placeholders uploads (vides au départ, gérés par PHP)
          touch deploy/uploads/.gitkeep
          touch deploy/uploads/veritas/.gitkeep

          echo ""
          echo "✅ Fichiers prêts pour déploiement :"
          find deploy -type f | sort

      - name: 🚀 Déployer via FTP vers veritas-school.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:   ftp.veritas-school.com
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir:  ./deploy/
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.gitkeep
          log-level: standard

      - name: 🔎 Vérifier le RAG (biblio_index.db présent sur le serveur)
        if: always()
        run: |
          echo "Vérification de l'index RAG sur https://veritas-school.com ..."
          RESP=$(curl -s --max-time 25 "https://veritas-school.com/api/rag.php?q=cameroun+minesec+francais&limit=1" || echo "")
          echo "Réponse rag.php : ${RESP:0:300}"
          if echo "$RESP" | grep -qE '"ok"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ RAG actif : biblio_index.db répond sur le serveur."
          else
            echo "::warning title=RAG inactif (corpus absent)::biblio_index.db n'est PAS sur le serveur — l'IA répond SANS le corpus MINESEC. Il est gitignoré (22 Mo) donc jamais déployé par la CI : uploadez-le manuellement en FTP vers …/api/data/biblio_index.db. Régénérez-le au besoin avec 'python index_corpus.py'."
          fi

      - name: 🔁 Rappel — version du Service Worker
        if: always()
        run: |
          SW_VER=$(grep -oE "veritas-v[0-9]+\.[0-9]+(\.[0-9]+)?" sw.js | head -1)
          echo "Service Worker déployé : ${SW_VER:-inconnu}"
          echo "::notice title=Service Worker (cache)::Incrémentez CACHE_VERSION dans sw.js à CHAQUE déploiement de contenu, sinon les appareils gardent l'ancienne version en cache. Version actuelle : ${SW_VER:-inconnu}."

      - name: ✅ Résumé du déploiement
        if: success()
        run: |
          echo "🎉 Déploiement réussi sur https://veritas-school.com"
          echo "   app.html / index.html → VÉRITAS v1.2"
          echo "   index.php             → wrapper no-cache LiteSpeed"
          echo "   api/db.php            → persistance JSON LWS"
          echo "   api/upload.php        → upload fichiers LWS"
          echo "   api/sync.php          → sync legacy (compatibilité)"
          echo "   Déployé le : $(date '+%d/%m/%Y à %H:%M:%S UTC')"
