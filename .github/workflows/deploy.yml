# ============================================================
# VÉRITAS — Déploiement automatique vers LWS
# Se déclenche à chaque push sur master
# ============================================================
name: 🚀 Déployer sur veritas-school.com

on:
  push:
    branches: [master]
    paths:
      - 'VERITAS_v1.0.html'
      - 'Logo détouré.png'
      - '.htaccess'
      - 'api/**'
      - 'evaluations/**'
      - 'cours/**'

  # Permet de lancer manuellement depuis GitHub
  workflow_dispatch:

jobs:
  deploy:
    name: 📤 Upload vers LWS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 📋 Préparer les fichiers pour le déploiement
        run: |
          mkdir -p deploy/api deploy/uploads/video deploy/uploads/epreuve deploy/uploads/cours deploy/uploads/ressource deploy/uploads/image
          # Le fichier principal → index.html à la racine du site
          cp VERITAS_v1.0.html deploy/index.html
          # Logo
          cp "Logo détouré.png" deploy/
          # .htaccess pour la sécurité, le cache et LiteSpeed
          if [ -f .htaccess ]; then cp .htaccess deploy/; fi
          # API PHP : config_sync.php (pas de credentials), sync.php, files.php, upload_video.php
          for f in api/config_sync.php api/upload.php api/files.php api/sync.php api/upload_video.php api/news_proxy.php; do
            [ -f "$f" ] && cp "$f" deploy/api/
          done
          # NE PAS déployer config.php (contient credentials MySQL)
          if [ -f api/database_mysql.sql ]; then cp api/database_mysql.sql deploy/api/; fi
          # Dossiers évaluations et cours interactifs
          if [ -d evaluations ]; then cp -r evaluations/ deploy/evaluations/; fi
          if [ -d cours ]; then cp -r cours/ deploy/cours/; fi
          # Placeholder pour les dossiers uploads
          touch deploy/uploads/.gitkeep
          echo "✅ Fichiers prêts :"
          find deploy -type f | head -20

      - name: 🚀 Déployer via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.veritas-school.com
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./deploy/
          server-dir: ./
          dangerous-clean-slate: false
          log-level: standard
